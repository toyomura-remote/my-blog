# --- 文字コード・言語設定 ---
client_encoding = 'UTF8'
lc_messages = 'en_US.utf8' # エラーメッセージを英語にする（検索しやすいため）

# --- ログ設定 (MySQLの general-log に相当) ---
log_statement = 'all'      # 実行されたすべてのクエリをログに記録
logging_collector = on     # ログをファイルに書き出す機能を有効化
log_directory = '/var/log/postgresql' # ログを保存するコンテナ内のパス
log_filename = 'postgresql-%Y-%m-%d.log' # ログファイル名のフォーマット